name: Zeabur Tokyo Watchdog

on:
  schedule:
    - cron: "*/10 * * * *"
  push:
    branches:
      - master
    paths:
      - ".github/workflows/zeabur-watchdog.yml"
      - "scripts/zeabur_watchdog.py"
      - "tests/test_zeabur_watchdog.py"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Log alerts and restart actions without sending or mutating"
        required: false
        default: "false"
      fail_on_issue:
        description: "Mark the workflow failed when issues are detected"
        required: false
        default: "true"

permissions:
  contents: read

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        id: preflight
        env:
          ZEABUR_API_KEY: ${{ secrets.ZEABUR_API_KEY }}
        run: |
          if [ -z "$ZEABUR_API_KEY" ]; then
            echo "::warning::ZEABUR_API_KEY secret is missing; watchdog skipped."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore watchdog state
        if: steps.preflight.outputs.ready == 'true'
        uses: actions/cache/restore@v4
        with:
          path: .watchdog-state
          key: zeabur-watchdog-state-${{ github.run_id }}
          restore-keys: |
            zeabur-watchdog-state-

      - name: Run watchdog
        if: steps.preflight.outputs.ready == 'true'
        env:
          ZEABUR_API_KEY: ${{ secrets.ZEABUR_API_KEY }}
          FEISHU_NOTIFY_APP_ID: ${{ secrets.FEISHU_NOTIFY_APP_ID }}
          FEISHU_NOTIFY_APP_SECRET: ${{ secrets.FEISHU_NOTIFY_APP_SECRET }}
          FEISHU_NOTIFY_OPEN_ID: ${{ secrets.FEISHU_NOTIFY_OPEN_ID }}
          FEISHU_NOTIFY_CHAT_ID: ${{ secrets.FEISHU_NOTIFY_CHAT_ID }}
          WATCHDOG_STATE_FILE: .watchdog-state/zeabur_watchdog_state.json
          WATCHDOG_SUMMARY_FILE: .watchdog-state/zeabur_watchdog_summary.json
          WATCHDOG_AUTO_RESTART_SERVICES: "true"
          WATCHDOG_CHECK_DEPLOYMENTS: "true"
          WATCHDOG_DEPLOYMENTS_PER_SERVICE: "10"
          WATCHDOG_DEPLOYMENT_LOOKBACK_MINUTES: "360"
          WATCHDOG_DEPLOYMENT_FAILURE_STATUSES: "FAILED"
          WATCHDOG_INCLUDE_BUILD_LOGS: "true"
          WATCHDOG_ZEABUR_API_RETRIES: "3"
          WATCHDOG_HEALTH_RETRIES: "2"
          WATCHDOG_ALERT_COOLDOWN_MINUTES: "60"
          WATCHDOG_RESTART_COOLDOWN_MINUTES: "60"
          WATCHDOG_FAIL_ON_ISSUE: "false"
          WATCHDOG_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
        run: python scripts/zeabur_watchdog.py

      - name: Save watchdog state
        if: steps.preflight.outputs.ready == 'true'
        uses: actions/cache/save@v4
        with:
          path: .watchdog-state
          key: zeabur-watchdog-state-${{ github.run_id }}

      - name: Evaluate watchdog result
        if: steps.preflight.outputs.ready == 'true'
        env:
          WATCHDOG_FAIL_ON_ISSUE: ${{ github.event_name == 'workflow_dispatch' && inputs.fail_on_issue || 'true' }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          path = ".watchdog-state/zeabur_watchdog_summary.json"
          if not os.path.exists(path):
              print("watchdog summary missing")
              sys.exit(2)

          with open(path, "r", encoding="utf-8") as fh:
              summary = json.load(fh)

          if not summary.get("ok", False) and os.getenv("WATCHDOG_FAIL_ON_ISSUE", "true").lower() == "true":
              print(f"watchdog found {summary.get('issue_count', 0)} issue(s)")
              sys.exit(2)

          print("watchdog result accepted")
          PY
